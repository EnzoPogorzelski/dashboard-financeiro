<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Financeiro Protegido</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.09);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --stroke: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --muted: #a7b3c8;
      --brand: #38bdf8;
      --brand2: #a78bfa;
      --bad: #fb7185;
      --good: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, .24), transparent 30rem),
        radial-gradient(circle at top right, rgba(167, 139, 250, .22), transparent 28rem),
        linear-gradient(135deg, #070a13 0%, #0b1020 46%, #111827 100%);
      padding: 22px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }
    .login {
      width: min(460px, 100%);
      position: relative;
      padding: 30px;
      border: 1px solid var(--stroke);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: 0 24px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(16px);
    }
    .badge {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(56,189,248,.3);
      border-radius: 999px;
      color: #bae6fd;
      background: rgba(56,189,248,.10);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 700;
    }
    .field {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input {
      width: 100%;
      border: 1px solid var(--stroke);
      outline: none;
      color: var(--text);
      background: rgba(2, 6, 23, .46);
      border-radius: 16px;
      padding: 15px 15px;
      font-size: 16px;
    }
    input:focus {
      border-color: rgba(56,189,248,.65);
      box-shadow: 0 0 0 4px rgba(56,189,248,.12);
    }
    button {
      border: 0;
      cursor: pointer;
      color: #031018;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      font-weight: 900;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 15px;
      white-space: nowrap;
      box-shadow: 0 14px 34px rgba(56,189,248,.18);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .7;
    }
    .message {
      min-height: 24px;
      margin-top: 14px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .note {
      margin-top: 20px;
      padding: 14px;
      border: 1px solid var(--stroke);
      border-radius: 18px;
      color: #cbd5e1;
      background: rgba(255,255,255,.055);
      font-size: 13px;
      line-height: 1.5;
    }
    .success {
      color: var(--good);
    }
  </style>
</head>
<body>
  <section class="login" aria-label="Acesso protegido">
    <div class="badge">🔐 Acesso protegido</div>
    <h1>Dashboard financeiro</h1>
    <p>Digite a senha para descriptografar e abrir o painel.</p>

    <form id="loginForm">
      <label for="password">Senha</label>
      <div class="field">
        <input id="password" type="password" autocomplete="current-password" placeholder="Digite a senha" autofocus />
        <button id="unlockBtn" type="submit">Entrar</button>
      </div>
      <div id="message" class="message" role="status"></div>
    </form>

    <div class="note">
      O conteúdo do dashboard fica criptografado neste arquivo. Sem a senha correta, o painel e os dados não são carregados no navegador.
    </div>
  </section>

    function fromBase64(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const encoder = new TextEncoder();
      const material = await crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations,
          hash: "SHA-256"
        },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password) {
      const salt = fromBase64(encryptedDashboard.salt);
      const iv = fromBase64(encryptedDashboard.iv);
      const ciphertext = fromBase64(encryptedDashboard.ciphertext);
      const key = await deriveKey(password, salt, encryptedDashboard.iterations);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        ciphertext
      );
      return new TextDecoder().decode(decrypted);
    }

    const form = document.getElementById("loginForm");
    const input = document.getElementById("password");
    const message = document.getElementById("message");
    const button = document.getElementById("unlockBtn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = input.value;
      if (!password) {
        message.textContent = "Digite a senha.";
        return;
      }

      button.disabled = true;
      button.textContent = "Abrindo...";
      message.textContent = "";

      try {
        const html = await unlock(password);
        message.className = "message success";
        message.textContent = "Senha correta. Carregando dashboard...";
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        message.className = "message";
        message.textContent = "Senha incorreta.";
        button.disabled = false;
        button.textContent = "Entrar";
        input.select();
      }
    });
  </script>
